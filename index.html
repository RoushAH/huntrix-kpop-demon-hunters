<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a0033">
  <meta name="description" content="HUNTRIX: K-Pop Demon Hunters - 8-bit beat-em-up game">

  <title>HUNTRIX: K-Pop Demon Hunters</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/css/styles.css">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="loading">
    <div class="loading-text">Loading HUNTRIX...</div>
  </div>

  <!-- MIDI Player for MIDI playback -->
  <script src="https://cdn.jsdelivr.net/npm/midi-player-js@2.0.1/browser/midiplayer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>

  <script src="/js/main.js" type="module"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('SW registered:', registration);
          })
          .catch(error => {
            console.log('SW registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
